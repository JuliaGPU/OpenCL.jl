steps:
  - label: "CUDA"
    plugins:
      - JuliaCI/julia#v1:
          version: "1.11"
      - JuliaCI/julia-coverage#v1:
          codecov: true
    commands: |
      julia --project -e '
        using Pkg

        println("--- :julia: Instantiating project")
        Pkg.develop(path="lib/intrinsics")

        println("+++ :julia: Running tests")
        Pkg.test(; coverage=true, test_args=`--platform=cuda`)'
    agents:
      queue: "juliagpu"
      cuda: "*"
    if: build.message !~ /\[skip tests\]/
    env:
      OCL_ICD_FILENAMES: "libnvidia-opencl.so.1"
    timeout_in_minutes: 60

  - label: "1.11 macos arm"
    plugins:
      - JuliaCI/julia#v1:
          version: "1.11"
      - JuliaCI/julia-coverage#v1:
          codecov: true
    commands: |
      julia --project -i -e '
        using Pkg

        println("--- :julia: Instantiating project")
        Pkg.add("pocl_jll")
        Pkg.develop(path="lib/intrinsics")

        versioninfo()

        println("+++ :julia: Running tests")
        Pkg.test(; coverage=true, test_args=`--platform=pocl --verbose`)'
    agents:
      queue: "juliaecosystem"
      os: "macos"
      arch: "aarch64"
    if: build.message !~ /\[skip tests\]/
    timeout_in_minutes: 120

  - label: "1.11 macos intel"
    plugins:
      - JuliaCI/julia#v1:
          version: "1.11"
      - JuliaCI/julia-coverage#v1:
          codecov: true
    commands: |
      julia --project -i -e '
        using Pkg

        println("--- :julia: Instantiating project")
        Pkg.add("pocl_jll")
        Pkg.develop(path="lib/intrinsics")

        versioninfo()

        println("+++ :julia: Running tests")
        Pkg.test(; coverage=true, test_args=`--platform=pocl --verbose`)'
    agents:
      queue: "juliaecosystem"
      os: "macos"
      arch: "x86_64"
    if: build.message !~ /\[skip tests\]/
    timeout_in_minutes: 120


  - label: "1.10 macos arm"
