name: Test

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ matrix.memory_backend }} - PoCL ${{ matrix.pocl }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 100
    permissions: # needed to allow julia-actions/cache to proactively delete old caches that it has created
      actions: write
      contents: read
    strategy:
      fail-fast: false
      # Hand-picked configurations instead of a full cross-product: the memory backend
      # is a host-side, load-time preference that's essentially orthogonal to OS, arch,
      # Julia version and PoCL build, so we cover all backends on the primary platform
      # (Linux x64) and rotate them across the other platforms. The `pocl` axis selects
      # the released JLL (`jll`), the upcoming release (`next`, via pocl_next_jll, run
      # on every platform), or upstream PoCL HEAD built from source (`local`, one job,
      # Linux-only).
      matrix:
        include:
          # full memory-backend coverage on the primary platform
          - { os: ubuntu-24.04, arch: x64, version: '1.12', pocl: jll, memory_backend: usm }
          - { os: ubuntu-24.04, arch: x64, version: '1.12', pocl: jll, memory_backend: svm }
          - { os: ubuntu-24.04, arch: x64, version: '1.12', pocl: jll, memory_backend: buffer }
          # oldest supported Julia
          - { os: ubuntu-24.04, arch: x64, version: '1.10', pocl: jll, memory_backend: usm }
          # other platforms, one job each (backends rotated for extra cross-coverage)
          - { os: ubuntu-24.04-arm, arch: arm64, version: '1.12', pocl: jll, memory_backend: svm }
          - { os: windows-2022, arch: x64, version: '1.12', pocl: jll, memory_backend: usm }
          # upcoming PoCL release (pocl_next_jll) on every platform
          - { os: ubuntu-24.04, arch: x64, version: '1.12', pocl: next, memory_backend: usm }
          - { os: ubuntu-24.04-arm, arch: arm64, version: '1.12', pocl: next, memory_backend: svm }
          - { os: windows-2022, arch: x64, version: '1.12', pocl: next, memory_backend: buffer }
          # upstream PoCL HEAD, built from source
          - { os: ubuntu-24.04, arch: x64, version: '1.12', pocl: local, memory_backend: usm }
    steps:
      - name: Checkout OpenCL.jl
        uses: actions/checkout@v7

      - name: Setup Julia
        uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}

      - name: Setup Julia cache
        uses: julia-actions/cache@v3

      - name: Checkout PoCL
        if: ${{ matrix.pocl == 'local' }}
        uses: actions/checkout@v7
        with:
          repository: pocl/pocl
          path: pocl

      - name: Install system dependencies
        if: ${{ matrix.pocl == 'local' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build pkg-config libsleef-dev

      - name: Install Julia dependencies
        if: ${{ matrix.pocl == 'local' }}
        run: |
            touch pocl/Project.toml
            julia --project=pocl --color=yes -e '
              using Pkg

              # unversioned
              Pkg.add([
                "SPIRV_Tools_jll",
                "OpenCL_jll",
                "OpenCL_Headers_jll",
                "Hwloc_jll",
                "CMake_jll",
              ])

              # versioned
              Pkg.add(name="LLVM_full_jll", version="20")
              Pkg.add(name="SPIRV_LLVM_Translator_jll", version="20")'

      - name: Build PoCL
        if: ${{ matrix.pocl == 'local' }}
        run: |
            julia --project=pocl --color=yes -e '
              using LLVM_full_jll,
                    SPIRV_Tools_jll, SPIRV_LLVM_Translator_jll,
                    OpenCL_jll, OpenCL_Headers_jll, CMake_jll

              sourcedir = joinpath(@__DIR__, "pocl")
              builddir = joinpath(@__DIR__, "build")
              destdir = joinpath(@__DIR__, "target")

              prefix = []
              for jll in [SPIRV_Tools_jll, SPIRV_LLVM_Translator_jll,
                          OpenCL_jll, OpenCL_Headers_jll]
                  push!(prefix, jll.artifact_dir)
              end

              withenv("LD_LIBRARY_PATH" => joinpath(Sys.BINDIR, Base.PRIVATE_LIBDIR)) do
                  mkpath(builddir)
                  run(```cmake -B $builddir -S $sourcedir
                        -GNinja
                        -DCMAKE_BUILD_TYPE=Debug
                        -DENABLE_TESTS:Bool=OFF
                        -DSTATIC_LLVM:Bool=On
                        -DCMAKE_INSTALL_PREFIX=$destdir
                        -DWITH_LLVM_CONFIG=$(LLVM_full_jll.artifact_dir)/tools/llvm-config
                        -DCMAKE_PREFIX_PATH="$(join(prefix, ";"))"
                        -DKERNELLIB_HOST_CPU_VARIANTS=distro```)

                  run(```$(cmake()) --build $builddir --parallel $(Sys.CPU_THREADS) --target install```)
              end'

            echo '[pocl_jll]' >> test/LocalPreferences.toml
            echo 'libpocl_path="${{ github.workspace }}/target/lib/libpocl.so"' >> test/LocalPreferences.toml

      - name: Setup OpenCL.jl
        run: |
          echo '[OpenCL]' >> test/LocalPreferences.toml
          echo 'default_memory_backend="${{ matrix.memory_backend }}"' >> test/LocalPreferences.toml
          julia --project -e '
            using Pkg
            # Julia 1.10 does not support [sources], so dev the in-tree
            # SPIRVIntrinsics; Pkg.test then carries it into the test sandbox.
            Pkg.develop(path="lib/intrinsics")'

      - name: Test OpenCL.jl
        uses: julia-actions/julia-runtest@v1
        if: runner.os != 'Windows'
        with:
          test_args: "--quickfail --verbose --platform=${{ matrix.pocl == 'next' && 'pocl_next' || 'pocl' }}"

      - name: Setup BusyBox
        if: runner.os == 'Windows'
        run: |
          Invoke-WebRequest https://frippery.org/files/busybox/busybox64.exe -OutFile C:\Windows\drop.exe
      - name: Test OpenCL.jl (de-escalated)
        if: runner.os == 'Windows'
        shell: drop -c "julia '{0}'"
        run: |
          using Pkg
          Pkg.activate(".")
          Pkg.test(; test_args=`--quickfail --verbose --platform=${{ matrix.pocl == 'next' && 'pocl_next' || 'pocl' }}`)

      - name: Upload compilation dumps
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compilation-dumps-${{ matrix.version }}-${{ matrix.os }}-${{ matrix.arch }}-${{ matrix.memory_backend }}-pocl-${{ matrix.pocl }}
          path: ${{ runner.temp }}/opencl-compilation-dumps/
          if-no-files-found: ignore

      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
